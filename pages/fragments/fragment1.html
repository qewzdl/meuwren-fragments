<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meuwren Fragment 1</title>
    <link rel="stylesheet" href="../../styles/reset.css">
    <link rel="stylesheet" href="../../styles/styles.css">

    <style>
        body {
            overflow: hidden;
            background-color: #000000;
        }

        main {
            padding: 72px 24px 40px;
        }

        .language-selector {
            z-index: 10;
        }

        .paragraph {
            max-width: 800px;
            color: #ffffff;
            line-height: 1.6;
            text-align: center;
        }

        .image-container {
            display: flex;
            justify-content: center;
            max-width: 100%;
        }

        .image-container img {
            display: block;
            width: auto;
            max-width: 100%;
            height: 400px;
            max-height: 62vh;
            object-fit: contain;
        }

        .fragment-step {
            display: none;
            width: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }

        .fragment-step--active {
            display: flex;
            animation: fragment-step-appearance 0.35s ease-out;
        }

        .phrase {
            color: rgb(125, 201, 255);
        }

        @keyframes fragment-step-appearance {
            from {
                opacity: 0;
                transform: translateX(12px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 740px) {
            main {
                padding: 24px 16px 80px;
            }

            .image-container img {
                height: auto;
                max-height: 58vh;
            }

            .fragment-step {
                gap: 24px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .fragment-step--active {
                animation: none;
            }
        }
    </style>
</head>
<body data-fragment="fragment1">
    <div class="language-selector">
        <ul class="language-selector__list">
            <li class="language-selector__item" data-lang="en">English</li>
            <li class="language-selector__item" data-lang="ru">Русский</li>
        </ul>
    </div>

    <main id="fragment-player" aria-live="polite">
        <!-- Frame 1: text + image -->
        <section class="fragment-step">
            <div class="image-container">
                <img src="../../images/fragment1/1.png" alt="Elias's graduation photograph">
            </div>

            <p class="paragraph" data-i18n="parents"></p>
        </section>

        <!-- Frame 2: text + image -->
        <section class="fragment-step">
            <div class="image-container">
                <img src="../../images/fragment1/2.png" alt="Elias twenty years later">
            </div>

            <p class="paragraph" data-i18n="patience"></p>
        </section>

        <!-- Frame 3: text -->
        <section class="fragment-step">
            <p class="paragraph" data-i18n="responsibility"></p>
        </section>

        <!-- Frame 4: text -->
        <section class="fragment-step">
            <p class="paragraph" data-i18n="fear"></p>
        </section>

        <!-- Frame 5: text -->
        <section class="fragment-step">
            <p class="paragraph" data-i18n="oneDay"></p>
        </section>

        <!-- Frame 6: text + image -->
        <section class="fragment-step">
            <div class="image-container">
                <img src="../../images/fragment1/1.png" alt="Elias's graduation photograph">
            </div>

            <p class="paragraph" data-i18n="rightMoment"></p>
        </section>

        <!-- Frame 7: text -->
        <section class="fragment-step">
            <p class="paragraph" data-i18n="mirrorBeginning"></p>
        </section>

        <!-- Frame 8: image -->
        <section class="fragment-step">
            <div class="image-container">
                <img src="../../images/fragment1/3.png" alt="Elias looking into a mirror">
            </div>
        </section>

        <!-- Frame 9: the same image with the next line -->
        <section class="fragment-step">
            <div class="image-container">
                <img src="../../images/fragment1/3.png" alt="Elias looking into a mirror">
            </div>

            <p class="paragraph" data-i18n="reflection"></p>
        </section>

        <!-- Frame 10: text + image -->
        <section class="fragment-step">
            <div class="image-container">
                <img src="../../images/fragment1/4.png" alt="The graduation photograph burning">
            </div>

            <p class="paragraph phrase" data-i18n="whyLie"></p>
        </section>

        <!-- Frame 11: text -->
        <section class="fragment-step">
            <p class="paragraph phrase" data-i18n="finalQuestion"></p>
        </section>
    </main>

    <script src="../../scripts/lang.js"></script>

    <script>
        (() => {
            const fragmentPlayer = document.querySelector('#fragment-player');
            const steps = Array.from(
                fragmentPlayer?.querySelectorAll(':scope > .fragment-step') ?? []
            );

            if (steps.length === 0) return;

            let currentStepIndex = 0;

            function showStep(index) {
                const nextIndex = Math.max(0, Math.min(index, steps.length - 1));

                steps.forEach((step, stepIndex) => {
                    const isActive = stepIndex === nextIndex;

                    step.classList.toggle('fragment-step--active', isActive);
                    step.setAttribute('aria-hidden', String(!isActive));
                });

                currentStepIndex = nextIndex;
            }

            function showNextStep() {
                showStep(currentStepIndex + 1);
            }

            function showPreviousStep() {
                showStep(currentStepIndex - 1);
            }

            function isInteractiveElement(target) {
                return target instanceof HTMLElement && (
                    target.isContentEditable ||
                    target.matches('input, textarea, select, button, a')
                );
            }

            document.addEventListener('keydown', (event) => {
                if (event.repeat || isInteractiveElement(event.target)) return;

                const forwardKeys = ['Space', 'Enter', 'ArrowRight'];

                if (forwardKeys.includes(event.code)) {
                    event.preventDefault();
                    showNextStep();
                    return;
                }

                if (event.code === 'ArrowLeft') {
                    event.preventDefault();
                    showPreviousStep();
                }
            });

            showStep(0);
        })();
    </script>
</body>
</html>
