<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Meuwren Fragment 1</title>

    <link rel="stylesheet" href="../../styles/reset.css">
    <link rel="stylesheet" href="../../styles/styles.css">

    <style>
        body {
            overflow: hidden;
            background-color: #000000;
        }

        main {
            width: 100%;
            height: 100vh;
            height: 100svh;

            padding: 72px 24px 40px;

            user-select: none;
            touch-action: manipulation;
        }

        .language-selector {
            z-index: 10;
        }

        .paragraph {
            width: 100%;
            max-width: 800px;

            color: #ffffff;

            font-size: clamp(14px, 2vw, 18px);
            line-height: 1.6;
            text-align: center;
        }

        /* Dialogue */

        .dialogue {
            width: min(100%, 720px);
            margin: 0;
            padding: 10px 18px;

            border-left: 1px solid rgba(255, 255, 255, 0.6);

            color: #ffffff;
        }

        .dialogue__text {
            font-size: clamp(14px, 2vw, 18px);
            font-weight: 400;
            font-style: italic;
            line-height: 1.6;
            text-align: left;
        }

        .dialogue--final {
            padding-block: 14px;
        }

        .dialogue--final .dialogue__text {
            font-size: clamp(15px, 2.2vw, 19px);
        }

        /* Images */

        .image-container {
            display: flex;
            justify-content: center;

            width: 100%;
            max-width: 100%;

            overflow: hidden;
        }

        .image-container img {
            display: block;

            width: auto;
            max-width: 100%;
            height: 400px;
            max-height: 62vh;

            object-fit: contain;
            object-position: var(--image-position, center);
        }

        /* Frames */

        .fragment-step {
            display: none;

            width: 100%;

            flex-direction: column;
            justify-content: center;
            align-items: center;

            gap: 32px;
        }

        .fragment-step--active {
            display: flex;
            animation: fragment-step-appearance 0.35s ease-out;
        }

        @keyframes fragment-step-appearance {
            from {
                opacity: 0;
                transform: translateX(12px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* End screen */

        .fragment-step--end {
            text-align: center;
            gap: 16px;
        }

        .fragment-end__label {
            color: #ffffff;

            font-size: 14px;
            letter-spacing: 0.2em;
            text-transform: uppercase;

            opacity: 0.6;
        }

        .fragment-end__title {
            color: #ffffff;

            font-size: clamp(28px, 6vw, 56px);
            font-weight: 200;
        }

        .fragment-end__hint {
            margin-top: 16px;

            color: #ffffff;

            font-size: 13px;
            line-height: 1.5;

            opacity: 0.45;
        }

        .fragment-end__hint--touch {
            display: none;
        }

        .fragment-end__exit {
            display: inline-flex;
            justify-content: center;
            align-items: center;

            margin-top: 24px;
            padding: 12px 24px;

            border: 1px solid #ffffff;

            color: #ffffff;
            background-color: transparent;

            font-family: inherit;
            font-size: 14px;
            text-decoration: none;

            transition:
                color 0.2s ease,
                background-color 0.2s ease,
                transform 0.2s ease;
        }

        .fragment-end__exit:hover {
            color: #000000;
            background-color: #ffffff;
        }

        .fragment-end__exit:active {
            transform: scale(0.97);
        }

        .fragment-end__exit:focus-visible {
            outline: 2px solid #ffffff;
            outline-offset: 4px;
        }

        /* Mobile */

        @media (max-width: 740px) {
            main {
                padding: 24px 16px 80px;
            }

            .image-container {
                width: 100vw;
                max-width: none;

                margin-inline: calc(50% - 50vw);

                overflow: hidden;
            }

            .image-container img {
                width: 100%;
                max-width: none;

                height: clamp(240px, 42svh, 380px);
                max-height: none;

                object-fit: cover;
                object-position: var(--image-position, center);
            }

            .fragment-step {
                gap: 24px;
            }

            .paragraph {
                padding-inline: 4px;
            }

            .dialogue {
                width: calc(100% - 16px);
                padding: 8px 14px;
            }

            .dialogue__text,
            .dialogue--final .dialogue__text {
                font-size: 14px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .fragment-end__hint--desktop {
                display: none;
            }

            .fragment-end__hint--touch {
                display: block;
            }

            .fragment-end__exit {
                min-width: 220px;
                min-height: 48px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .fragment-step--active {
                animation: none;
            }

            .fragment-end__exit {
                transition: none;
            }
        }
    </style>
</head>

<body data-fragment="fragment1">
    <div class="language-selector">
        <ul class="language-selector__list">
            <li class="language-selector__item" data-lang="en">

    </div>

    <main id="fragment-player" aria-live="polite">
        <!-- Frame 1: text + image -->

        <section class="fragment-step">

                    src="../../images/fragment1/1.png"
                    alt="Elias's graduation photograph"
                    style="--image-position: center;"
                >
            </div>

            <p class="paragraph" data-i18n="parents"></p>
        </section>

        <!-- Frame 2: text + image -->

        <section class="fragment-step">
            <div class="image-container">

                    src="../../images/fragment1/2.png"
                    alt="Elias twenty years later"
                    style="--image-position: center;"
                >
            </div>

            <p class="paragraph" data-i18n="patience"></p>
        </section>

        <!-- Frame 3: text -->

        <section class="fragment-step">
            <p class="paragraph" data-i18n="responsibility"></p>
        </section>

        <!-- Frame 4: text -->

        <section class="fragment-step">
            <p class="paragraph" data-i18n="fear"></p>
        </section>

        <!-- Frame 5: text -->

        <section class="fragment-step">
            <p class="paragraph" data-i18n="oneDay"></p>
        </section>

        <!-- Frame 6: text + image -->

        <section class="fragment-step">
            <div class="image-container">
                <img
                    src="../../images/fragment1/1.png"
                    alt="Elias's graduation photograph"
                    style="--image-position: center;"
                >
            </div>

            <p class="paragraph" data-i18n="rightMoment"></p>
        </section>

        <!-- Frame 7: text -->

        <section class="fragment-step">
            <p class="paragraph" data-i18n="mirrorBeginning"></p>
        </section>

        <!-- Frame 8: image -->

        <section class="fragment-step">
            <div class="image-container">
                <img
                    src="../../images/fragment1/3.png"
                    alt="Elias looking into a mirror"
                    style="--image-position: center;"
                >
            </div>
        </section>

        <!-- Frame 9: image + text -->

        <section class="fragment-step">
            <div class="image-container">
                <img
                    src="../../images/fragment1/3.png"
                    alt="Elias looking into a mirror"
                    style="--image-position: center;"
                >
            </div>

            <p class="paragraph" data-i18n="reflection"></p>
        </section>

        <!-- Frame 10: text + image -->

        <section class="fragment-step">
            <div class="image-container">
                <img
                    src="../../images/fragment1/4.png"
                    alt="The graduation photograph burning"
                    style="--image-position: center;"
                >
            </div>

            <blockquote class="dialogue">
                <p class="dialogue__text" data-i18n="whyLie"></p>
            </blockquote>
        </section>

        <!-- Frame 11: text -->

        <section class="fragment-step">
            <blockquote class="dialogue dialogue--final">
                <p class="dialogue__text" data-i18n="finalQuestion"></p>
            </blockquote>
        </section>

        <!-- End screen -->

        <section class="fragment-step fragment-step--end">
            <p
                class="fragment-end__label"
                data-i18n="endLabel"
            >
                Фрагмент завершён
            </p>

            <p class="fragment-end__title">
                Meuwren Fragments
            </p>

            <p
                class="fragment-end__hint fragment-end__hint--desktop"
                data-i18n="endHintDesktop"
            >
                Нажмите слева или используйте ←, чтобы вернуться
            </p>

            <p
                class="fragment-end__hint fragment-end__hint--touch"
                data-i18n="endHintTouch"
            >
                Коснитесь левой части экрана, чтобы вернуться
            </p>

            <a
                class="fragment-end__exit"
                href="/"
                data-i18n="exitButton"
            >
                Вернуться к фрагментам
            </a>
        </section>
    </main>

    <script src="../../scripts/lang.js"></script>

    <script>
        (() => {
            const fragmentPlayer = document.querySelector('#fragment-player');

            const steps = Array.from(
                fragmentPlayer?.querySelectorAll(':scope > .fragment-step') ?? []
            );

            if (steps.length === 0) return;

            let currentStepIndex = 0;

            function showStep(index) {
                const nextIndex = Math.max(
                    0,
                    Math.min(index, steps.length - 1)
                );

                steps.forEach((step, stepIndex) => {
                    const isActive = stepIndex === nextIndex;

                    step.classList.toggle(
                        'fragment-step--active',
                        isActive
                    );

                    step.setAttribute(
                        'aria-hidden',
                        String(!isActive)
                    );
                });

                currentStepIndex = nextIndex;
            }

            function showNextStep() {
                showStep(currentStepIndex + 1);
            }

            function showPreviousStep() {
                showStep(currentStepIndex - 1);
            }

            function isInteractiveElement(target) {
                return target instanceof HTMLElement && (
                    target.isContentEditable ||
                    target.matches(
                        'input, textarea, select, button, a'
                    )
                );
            }

            /*
                Keyboard navigation
            */

            document.addEventListener('keydown', (event) => {
                if (
                    event.repeat ||
                    isInteractiveElement(event.target)
                ) {
                    return;
                }

                const forwardKeys = [
                    'Space',
                    'Enter',
                    'ArrowRight'
                ];

                if (forwardKeys.includes(event.code)) {
                    event.preventDefault();
                    showNextStep();
                    return;
                }

                if (event.code === 'ArrowLeft') {
                    event.preventDefault();
                    showPreviousStep();
                }
            });

            /*
                Mouse and touch navigation
            */

            let pointerStart = null;

            const maximumTapMovement = 12;

            function isNavigationControl(target) {
                return target instanceof Element && (
                    target.closest('.language-selector') ||
                    target.closest(
                        'input, textarea, select, button, a'
                    )
                );
            }

            document.addEventListener('pointerdown', (event) => {
                if (
                    event.pointerType === 'mouse' &&
                    event.button !== 0
                ) {
                    return;
                }

                if (isNavigationControl(event.target)) {
                    return;
                }

                pointerStart = {
                    pointerId: event.pointerId,
                    x: event.clientX,
                    y: event.clientY
                };
            });

            document.addEventListener('pointerup', (event) => {
                if (
                    !pointerStart ||
                    pointerStart.pointerId !== event.pointerId
                ) {
                    return;
                }

                const movementX =
                    event.clientX - pointerStart.x;

                const movementY =
                    event.clientY - pointerStart.y;

                const movement = Math.hypot(
                    movementX,
                    movementY
                );

                pointerStart = null;

                if (movement > maximumTapMovement) {
                    return;
                }

                if (isNavigationControl(event.target)) {
                    return;
                }

                const clickedOnLeftHalf =
                    event.clientX < window.innerWidth / 2;

                if (clickedOnLeftHalf) {
                    showPreviousStep();
                } else {
                    showNextStep();
                }
            });

            document.addEventListener('pointercancel', () => {
                pointerStart = null;
            });

            showStep(0);
        })();
    </script>
</body>
</html>
